pipeline: posts_and_users
steps:
  - id: get_posts
    type: http
    method: POST
    url: https://jsonplaceholder.typicode.com/posts
    content_type: application/json
    body: '{
      "title": "foo",
      "body": "bar",
      "userId": 1
    }'
    assert:
      - "status eq 201"

  - id: create_user
    type: http
    method: POST
    url: https://jsonplaceholder.typicode.com/users
    headers:
      Authorization: "Bearer {{ env.TOKEN }}"
    content_type: application/json
    body: '{
      "username": "Bret",
      "email": "Sincere@april.biz"
    }'

  - id: verify_user
    type: http
    method: GET
    url: https://jsonplaceholder.typicode.com/users
    query:
      id: "{{ create_user | body id }}"
      _limit: "1"
    assert:
      - "status eq 200"
      - "body 0.name eq Leanne Graham"

  # The engine spins up a temporary listener
