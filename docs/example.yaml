pipeline: e_commerce_checkout
steps:
  - id: add_to_cart
    type: http
    method: Post
    url: https://api.yourshop.com/cart
    body: { "item_id": 123, "qty": 1 }

  - id: checkout
    type: http
    method: Post
    url: https://api.yourshop.com/checkout
    headers:
      Authorization: "Bearer {{ env.TOKEN }}"
    body: { "cart_id": "{{ steps.add_to_cart.response.body.id }}" }

  # The engine spins up a temporary listener
  - id: wait_for_payment_webhook
    type: webhook_listener
    port: 8080
    timeout_seconds: 30
    expect_match:
      body.status: "succeeded"
      body.order_id: "{{ steps.checkout.response.body.order_id }}"

  - id: verify_order_status
    type: http
    method: Get
    url: https://api.yourshop.com/orders/{{ steps.checkout.response.body.order_id }}
    assert:
      - response.status == 200
      - response.body.status == "PAID"